name: publish

on:
  push:
    tags:
      - "v*"          # package releases only; never matches index-* tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build sdist and wheel
        working-directory: backend      # package lives here
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: backend/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi                   # matches the trusted publisher config
    permissions:
      id-token: write                   # required for OIDC / trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/                   # the publish action looks in ./dist by default

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
